\* TLC config — §1.4 up() upstream axis.
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC -config wave_protocol_up.cfg wave_protocol_up_MC
\*
\* Expected outcome: all invariants hold. New up-axis invariants
\* (UpQueuesCarryControlPlane, UpPauseOriginatorBound) are actively
\* exercised via upstream PAUSE/RESUME origination at B.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    NodeIds             <- NodeIdsMC
    SourceIds           <- SourceIdsMC
    SinkIds             <- SinkIdsMC
    Edges               <- EdgesMC
    Values              <- ValuesMC
    DefaultInitial      <- DefaultInitMC
    MaxEmits            <- MaxEmitsMC
    BatchSeqs           <- BatchSeqsMC
    GapAwareActivation  <- GapAwareActivationMC
    SinkNestedEmits     <- SinkNestedEmitsMC
    MaxNestedEmits      <- MaxNestedEmitsMC
    LockIds             <- LockIdsMC
    Pausable            <- PausableMC
    ResubscribableNodes <- ResubscribableNodesMC
    MaxPauseActions     <- MaxPauseActionsMC
    UpOriginators       <- UpOriginatorsMC
    MaxUpActions        <- MaxUpActionsMC
    ExtraSinks          <- ExtraSinksMC

\* `EqualsFaithful` is excluded for the single-source degenerate reason:
\* a 2-node chain where A is the only source would vacuously pass it, but
\* the up-axis can leave A's emit in transit while `status[A]` is not
\* terminated, so the invariant shape (trace[s]=emitCount) still checks.
\* We keep it in for completeness.
INVARIANTS
    TypeOK
    NoDataWithoutDirty
    BalancedWaves
    TerminalAbsorbing
    DiamondConvergence
    EqualsFaithful
    VersionPerChange
    StartHandshakeValid
    MultiDepHandshakeClean
    NestedDrainPeerConsistency
    TerminalClearsPauseState
    BufferImpliesLockedAndResumeAll
    BufferHoldsOnlyDeferredTiers
    ResubscribeYieldsCleanState
    UpQueuesCarryControlPlane
    UpPauseOriginatorBound
    MultiSinkTracesConverge
    PausableOffStructural
