\* TLC config — nested-drain mode for wave_protocol.tla.
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC -config wave_protocol_nested.cfg wave_protocol_nested_MC
\*
\* Expected outcome: all invariants hold. `NestedDrainPeerConsistency` in
\* particular is the regression guard — any future substrate change that
\* relaxes tier ordering or removes the `NoDirtyAnywhere` guard on
\* `DeliverSettle` will trip it here with a counter-example.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    NodeIds             <- NodeIdsMC
    SourceIds           <- SourceIdsMC
    SinkIds             <- SinkIdsMC
    Edges               <- EdgesMC
    Values              <- ValuesMC
    DefaultInitial      <- DefaultInitMC
    MaxEmits            <- MaxEmitsMC
    BatchSeqs           <- BatchSeqsMC
    GapAwareActivation  <- GapAwareActivationMC
    SinkNestedEmits     <- SinkNestedEmitsMC
    MaxNestedEmits      <- MaxNestedEmitsMC
    LockIds             <- LockIdsMC
    Pausable            <- PausableMC
    ResubscribableNodes <- ResubscribableNodesMC
    MaxPauseActions     <- MaxPauseActionsMC
    UpOriginators       <- UpOriginatorsMC
    MaxUpActions        <- MaxUpActionsMC
    ExtraSinks          <- ExtraSinksMC
    ResetOnTeardownNodes <- ResetOnTeardownNodesMC
    InvalidateOriginators <- InvalidateOriginatorsMC
    MaxInvalidates       <- MaxInvalidatesMC
    AutoCompleteOnDepsComplete <- AutoCompleteOnDepsCompleteMC
    AutoErrorOnDepsError       <- AutoErrorOnDepsErrorMC
    ReplayBufferSize <- ReplayBufferSizeMC
    EqualsAbsorbs    <- EqualsAbsorbsMC
    MetaCompanions   <- MetaCompanionsMC
    MaxTeardowns     <- MaxTeardownsMC

\* `EqualsFaithful` was previously dropped here because it referenced the
\* global `emitCount` — sound for single-source topologies but broken for
\* multi-source (the nested MC has two sources A and B; each source's trace
\* records only its own emits while `emitCount` aggregates both). Re-enabled
\* 2026-04-23 now that the invariant uses `perSourceEmitCount[s]` — a per-
\* source counter incremented by Emit/BatchEmitMulti/SinkNestedEmit at the
\* emitting source's slot. I4 fix landed; see docs/optimizations.md.
\*
\* `VersionPerChange` keeps its single-source-clean shape: it compares
\* `version[s]` (per-node) against DATA count in the source's own trace —
\* independent of `emitCount`.
INVARIANTS
    TypeOK
    NoDataWithoutDirty
    BalancedWaves
    TerminalAbsorbing
    DiamondConvergence
    EqualsFaithful
    VersionPerChange
    StartHandshakeValid
    MultiDepHandshakeClean
    NestedDrainPeerConsistency
    TerminalClearsPauseState
    BufferImpliesLockedAndResumeAll
    BufferHoldsOnlyDeferredTiers
    ResubscribeYieldsCleanState

    UpQueuesCarryControlPlane
    UpPauseOriginatorBound
    MultiSinkTracesConverge
    MultiSinkIterationCoherent
    CleanupWitnessInValueDomain
    ReplayBufferBounded
    MetaTeardownObservedPreReset
    PausableOffStructural
    LateSubscriberReceivesReplay
    CleanupWitnessNotSentinel
