\* TLC config — nested-drain mode for wave_protocol.tla.
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC -config wave_protocol_nested.cfg wave_protocol_nested_MC
\*
\* Expected outcome: all invariants hold. `NestedDrainPeerConsistency` in
\* particular is the regression guard — any future substrate change that
\* relaxes tier ordering or removes the `NoDirtyAnywhere` guard on
\* `DeliverSettle` will trip it here with a counter-example.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    NodeIds             <- NodeIdsMC
    SourceIds           <- SourceIdsMC
    SinkIds             <- SinkIdsMC
    Edges               <- EdgesMC
    Values              <- ValuesMC
    DefaultInitial      <- DefaultInitMC
    MaxEmits            <- MaxEmitsMC
    BatchSeqs           <- BatchSeqsMC
    GapAwareActivation  <- GapAwareActivationMC
    SinkNestedEmits     <- SinkNestedEmitsMC
    MaxNestedEmits      <- MaxNestedEmitsMC
    LockIds             <- LockIdsMC
    Pausable            <- PausableMC
    ResubscribableNodes <- ResubscribableNodesMC
    MaxPauseActions     <- MaxPauseActionsMC
    UpOriginators       <- UpOriginatorsMC
    MaxUpActions        <- MaxUpActionsMC
    ExtraSinks          <- ExtraSinksMC

\* `EqualsFaithful` is dropped here intentionally — it encodes
\* "settlements observed at the source equal global emitCount." That holds
\* trivially when SourceIds is a singleton (the original topology) but
\* breaks for multi-source models because emitCount aggregates across every
\* source while each source's trace records only its own emissions. This is
\* I4 in the rigor-infra inconsistencies: a single-source-implicit invariant
\* that should be generalized (per-source emit counter) — tracked as a
\* follow-up in docs/optimizations.md.
\*
\* `VersionPerChange` has the same single-source shape but remains sound
\* because it compares `version[s]` (per-node) against DATA count in the
\* source's own trace — independent of `emitCount`.
INVARIANTS
    TypeOK
    NoDataWithoutDirty
    BalancedWaves
    TerminalAbsorbing
    DiamondConvergence
    VersionPerChange
    StartHandshakeValid
    MultiDepHandshakeClean
    NestedDrainPeerConsistency
    TerminalClearsPauseState
    BufferImpliesLockedAndResumeAll
    BufferHoldsOnlyDeferredTiers
    ResubscribeYieldsCleanState

    UpQueuesCarryControlPlane
    UpPauseOriginatorBound
    MultiSinkTracesConverge
    PausableOffStructural
