\* TLC config — Package 7 meta TEARDOWN axis exercise.
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC \
\*     -config wave_protocol_meta_teardown.cfg wave_protocol_meta_teardown_MC
\*
\* Expected outcome: all 19 invariants hold under the shipped Package 5
\* auto-terminal gating + D1 rescue-recompute fix. Verifies that M observes cache + status at A PRE-reset.
\* 
\* 
\* 

