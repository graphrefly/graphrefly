\* TLC config — Package 6 diamond INVALIDATE exercise (batch 5, B, 2026-04-23).
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC \
\*     -config wave_protocol_invalidate_diamond.cfg wave_protocol_invalidate_diamond_MC
\*
\* Expected outcome: all invariants hold under the batch-5 witness guard.
\* Specifically `CleanupWitnessNotSentinel` holds: the second DeliverInvalidate
\* arriving at D observes the already-reset sentinel and skips the witness
\* append. Reverting the guard in `wave_protocol.tla` should reintroduce the
\* DefaultInitial witness entry and trip this invariant in < 10 steps.

