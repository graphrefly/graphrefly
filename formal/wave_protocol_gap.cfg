\* TLC config — gap-aware (substrate-faithful) model for wave_protocol.tla.
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC -config wave_protocol_gap.cfg wave_protocol_gap_MC
\*
\* Expected outcome: `MultiDepHandshakeClean` FAILS with a counter-example
\* trace showing D's handshake contains a RESOLVED between the first DIRTY
\* and the DATA. All other invariants hold.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    NodeIds            <- NodeIdsMC
    SourceIds          <- SourceIdsMC
    SinkIds            <- SinkIdsMC
    Edges              <- EdgesMC
    Values             <- ValuesMC
    DefaultInitial     <- DefaultInitMC
    MaxEmits           <- MaxEmitsMC
    BatchSeqs          <- BatchSeqsMC
    GapAwareActivation <- GapAwareActivationMC
    SinkNestedEmits    <- SinkNestedEmitsMC
    MaxNestedEmits     <- MaxNestedEmitsMC

INVARIANTS
    TypeOK
    NoDataWithoutDirty
    BalancedWaves
    TerminalAbsorbing
    DiamondConvergence
    EqualsFaithful
    VersionPerChange
    StartHandshakeValid
    MultiDepHandshakeClean
    NestedDrainPeerConsistency
