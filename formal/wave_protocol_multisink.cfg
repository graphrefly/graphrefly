\* TLC config — §2.4 multi-sink iteration axis.
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC -config wave_protocol_multisink.cfg wave_protocol_multisink_MC
\*
\* Expected outcome: all 18 invariants hold. `MultiSinkTracesConverge`
\* structurally confirms that primary sink and extra sink observe the same
\* sequence of messages at full drain. The stricter "cache at extra-sink
\* dequeue time equals DATA payload" property — which would systematically
\* capture §32-class peer-read bugs — is deferred (see
\* graphrefly-ts/docs/optimizations.md "Multi-sink iteration cache
\* coherence"). The current permissive model allows benign wave-lag between
\* primary and extra sinks, which trips the stricter form on legitimate
\* behaviour. Tightening requires per-node pending-drain gating on
\* emission actions to mirror the runtime's atomic `_deliverToSinks`
\* iteration — tracked as a follow-up.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    NodeIds             <- NodeIdsMC
    SourceIds           <- SourceIdsMC
    SinkIds             <- SinkIdsMC
    Edges               <- EdgesMC
    Values              <- ValuesMC
    DefaultInitial      <- DefaultInitMC
    MaxEmits            <- MaxEmitsMC
    BatchSeqs           <- BatchSeqsMC
    GapAwareActivation  <- GapAwareActivationMC
    SinkNestedEmits     <- SinkNestedEmitsMC
    MaxNestedEmits      <- MaxNestedEmitsMC
    LockIds             <- LockIdsMC
    Pausable            <- PausableMC
    ResubscribableNodes <- ResubscribableNodesMC
    MaxPauseActions     <- MaxPauseActionsMC
    UpOriginators       <- UpOriginatorsMC
    MaxUpActions        <- MaxUpActionsMC
    ExtraSinks          <- ExtraSinksMC
    ResetOnTeardownNodes <- ResetOnTeardownNodesMC
    InvalidateOriginators <- InvalidateOriginatorsMC
    MaxInvalidates       <- MaxInvalidatesMC
    AutoCompleteOnDepsComplete <- AutoCompleteOnDepsCompleteMC
    AutoErrorOnDepsError       <- AutoErrorOnDepsErrorMC
    ReplayBufferSize <- ReplayBufferSizeMC
    EqualsAbsorbs    <- EqualsAbsorbsMC
    MetaCompanions   <- MetaCompanionsMC
    MaxTeardowns     <- MaxTeardownsMC

\* `EqualsFaithful` is excluded as in nested_MC — its emitCount comparison is
\* single-source-implicit. The nested path plus the multi-sink axis keep the
\* model away from that shape.
