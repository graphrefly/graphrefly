\* TLC config — §2.5 custom-equality axis exercise (batch 9, E, 2026-04-24).
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC \
\*     -config wave_protocol_custom_equals.cfg wave_protocol_custom_equals_MC
\*
\* Expected outcome: all 26 invariants hold under the non-identity
\* `EqualsPairs[A]` (0 and 1 interchangeable; 2 strictly distinct).
\* Load-bearing for the Emit / BatchEmitMulti / SinkNestedEmit /
\* DeliverSettle threading of `IsAbsorbed`: reverting any of those to the
\* pre-batch-9 raw `=` check would produce DATA where the relation
\* dictates RESOLVED (or vice versa) and break `EqualsFaithful` (#5) via
\* a skewed settlement count. Complements `wave_protocol_equals_false_MC`
\* (`EqualsPairs[A] = {}` — never absorb) by exercising an intermediate
\* absorption relation that strictly wasn't expressible under the
\* batch-3 `EqualsAbsorbs: NodeIds -> BOOLEAN`.

SPECIFICATION Spec

