\* TLC config — default model for wave_protocol.tla.
\*
\* Model constants live in wave_protocol_MC.tla (TLC .cfg can't express
\* tuple-literal sets directly). Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC -config wave_protocol.cfg wave_protocol_MC

SPECIFICATION Spec

\* Terminal states (all sources terminated, all queues drained) have no
\* enabled actions — that is the correct quiesced end state, not a bug.
CHECK_DEADLOCK FALSE

CONSTANTS
    NodeIds             <- NodeIdsMC
    SourceIds           <- SourceIdsMC
    SinkIds             <- SinkIdsMC
    Edges               <- EdgesMC
    Values              <- ValuesMC
    DefaultInitial      <- DefaultInitMC
    MaxEmits            <- MaxEmitsMC
    BatchSeqs           <- BatchSeqsMC
    GapAwareActivation  <- GapAwareActivationMC
    SinkNestedEmits     <- SinkNestedEmitsMC
    MaxNestedEmits      <- MaxNestedEmitsMC
    LockIds             <- LockIdsMC
    Pausable            <- PausableMC
    ResubscribableNodes <- ResubscribableNodesMC
    MaxPauseActions     <- MaxPauseActionsMC
    UpOriginators       <- UpOriginatorsMC
    MaxUpActions        <- MaxUpActionsMC
    ExtraSinks          <- ExtraSinksMC
    ResetOnTeardownNodes <- ResetOnTeardownNodesMC
    InvalidateOriginators <- InvalidateOriginatorsMC
    MaxInvalidates       <- MaxInvalidatesMC
    AutoCompleteOnDepsComplete <- AutoCompleteOnDepsCompleteMC
    AutoErrorOnDepsError       <- AutoErrorOnDepsErrorMC
    ReplayBufferSize <- ReplayBufferSizeMC
    EqualsPairs      <- EqualsPairsMC
    MetaCompanions   <- MetaCompanionsMC
    MaxTeardowns     <- MaxTeardownsMC

INVARIANTS
    TypeOK
    NoDataWithoutDirty
    BalancedWaves
    TerminalAbsorbing
    DiamondConvergence
    EqualsFaithful
    VersionPerChange
    StartHandshakeValid
    MultiDepHandshakeClean
    NestedDrainPeerConsistency
    TerminalClearsPauseState
    BufferImpliesLockedAndResumeAll
    BufferHoldsOnlyDeferredTiers
    ResubscribeYieldsCleanState
    UpQueuesCarryControlPlane
    UpPauseOriginatorBound
    MultiSinkTracesConverge
    MultiSinkIterationCoherent
    CleanupWitnessInValueDomain
    ReplayBufferBounded
    MetaTeardownObservedPreReset
    PausableOffStructural
    LateSubscriberReceivesReplay
    CleanupWitnessNotSentinel
    NoDepCascadeTerminalWhenGateFalse
    CleanupWitnessAccounting
    MultiSinkIterationDriftClean
    TerminatedImpliesBatchIdle
