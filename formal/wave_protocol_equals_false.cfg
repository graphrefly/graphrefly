\* TLC config — §2.5 equals-variance exercise (batch 6, F, 2026-04-23).
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC \
\*     -config wave_protocol_equals_false.cfg wave_protocol_equals_false_MC
\*
\* Expected outcome: all 26 invariants hold. `EqualsAbsorbs[A] = FALSE`
\* forces every emit at A to produce DATA (never RESOLVED). `EqualsFaithful`
\* (#5) still holds because its contract is "one settlement per emit at
\* the source" — DATA counts just like RESOLVED did. Reverting the
\* `EqualsAbsorbs[n]` check in Emit / BatchEmitMulti / SinkNestedEmit
\* would produce RESOLVED where DATA is required (when a same-value emit
\* repeats) and break EqualsFaithful by producing a RESOLVED that the
\* runtime contract of `equals: () => false` promises will never appear.

