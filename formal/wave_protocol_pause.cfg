\* TLC config — pause axis enabled.
\*
\* Run with:
\*   java -cp <tla2tools.jar> tlc2.TLC -config wave_protocol_pause.cfg wave_protocol_pause_MC
\*
\* Expected outcome: all invariants hold. The four new pause-axis invariants
\* (TerminalClearsPauseState, BufferImpliesLockedAndResumeAll,
\* BufferHoldsOnlyDeferredTiers, ResubscribeYieldsCleanState) are now
\* actively exercised — TLC explores every interleaving of Pause/Resume
\* (two lock ids) with Emit / SubscribeSink / Deliver* actions.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    NodeIds             <- NodeIdsMC
    SourceIds           <- SourceIdsMC
    SinkIds             <- SinkIdsMC
    Edges               <- EdgesMC
    Values              <- ValuesMC
    DefaultInitial      <- DefaultInitMC
    MaxEmits            <- MaxEmitsMC
    BatchSeqs           <- BatchSeqsMC
    GapAwareActivation  <- GapAwareActivationMC
    SinkNestedEmits     <- SinkNestedEmitsMC
    MaxNestedEmits      <- MaxNestedEmitsMC
    LockIds             <- LockIdsMC
    Pausable            <- PausableMC
    ResubscribableNodes <- ResubscribableNodesMC
    MaxPauseActions     <- MaxPauseActionsMC

INVARIANTS
    TypeOK
    NoDataWithoutDirty
    BalancedWaves
    TerminalAbsorbing
    DiamondConvergence
    EqualsFaithful
    VersionPerChange
    StartHandshakeValid
    MultiDepHandshakeClean
    NestedDrainPeerConsistency
    TerminalClearsPauseState
    BufferImpliesLockedAndResumeAll
    BufferHoldsOnlyDeferredTiers
    ResubscribeYieldsCleanState
